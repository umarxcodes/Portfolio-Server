services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: portfolio-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - .env

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--input-type=module",
          "-e",
          "import http from 'node:http'; const req = http.get('http://localhost:5000/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
